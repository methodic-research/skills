name: skills-e2e

# Per the design in runes/chronicle/designs/third-party-agent-flow.md:
# - lint runs on PRs and on pushes to main (cheap, no secrets);
# - the full E2E runs on PRs into main, driving the skills against the deployed
#   ci instance with a headless Claude Code agent that runs its OWN tiny CPU
#   training (no Menlo Park worker — the agent owns the training).
#
# push is deliberately limited to main: a bare `push` trigger gave every PR
# head TWO check runs per job name (push event + pull_request event), which
# made the ruleset's required contexts (`lint`, `e2e`) resolve ambiguously —
# and the push-event `e2e` always reports *skipped*, which GitHub counts as
# satisfying a required check. One event per PR SHA keeps the gate honest.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Static skill lint (frontmatter + no stale API surface)
        run: python3 e2e/lint_skills.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: MCP launcher tests (node reference + python fallback)
        run: |
          node --test mcp/server.test.js
          python3 mcp/server_test.py
      - name: MCP launcher runtime probe
        # launch.sh must pick a runtime from PATH and fail with a clear install
        # hint when there is none — Claude Code does not bundle node, which is
        # exactly how this broke for real users.
        run: |
          sh -n mcp/launch.sh
          # full PATH → node runs the launcher; stdin EOF exits 0
          CHRONICLE_API_KEY=sk_probe sh mcp/launch.sh </dev/null
          # python3-only PATH → falls back to the stdlib python port
          probe="$(mktemp -d)"
          ln -s "$(command -v python3)" "$probe/python3"
          PATH="$probe" CHRONICLE_API_KEY=sk_probe /bin/sh mcp/launch.sh </dev/null
          # no runtimes at all → non-zero exit + a clear message
          if PATH="$(mktemp -d)" /bin/sh mcp/launch.sh </dev/null 2>probe-err.log; then
            echo "expected the shim to fail with no runtimes on PATH"; exit 1
          fi
          grep -q "no supported runtime" probe-err.log

  e2e:
    # Only the full flow needs secrets + compute; runs on PRs into main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # create turn + driver run-wait + distill turn, each bounded separately.
    timeout-minutes: 60
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install driver + SDK + the agent's training deps
        # requests: the driver's REST assertions. methodic-research: the SDK the
        # skills import (`from methodic import Chronicle`) — a real user installs
        # it, so the e2e must too or every skill ImportErrors. wandb + numpy: the
        # agent writes + runs its OWN tiny CPU training and logs loss to W&B, so
        # both must be importable in the env the agent shells `python` into.
        run: pip install requests methodic-research wandb numpy
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Run skills E2E against ci
        # Driver SKIPs (exit 0) if any secret is absent (e.g. fork PRs).
        env:
          CHRONICLE_CI_AUTH_ACCOUNT: ${{ secrets.CHRONICLE_CI_AUTH_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: python3 e2e/run_skills_e2e.py
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skills-e2e-logs
          path: e2e/logs/
          if-no-files-found: ignore
